name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Audit formula
        run: brew audit --formula "$GITHUB_WORKSPACE/Formula/night-agent.rb" || true

      - name: Install formula
        run: brew install --build-from-source "$GITHUB_WORKSPACE/Formula/night-agent.rb"

      - name: Run formula tests
        run: brew test night-agent
