name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Tap this repo
        run: brew tap pietroperona/night-agent "$GITHUB_WORKSPACE"

      - name: Audit formula
        run: brew audit --new-formula night-agent || true

      - name: Install formula
        run: brew install --build-from-source night-agent

      - name: Run formula tests
        run: brew test night-agent
